<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device & Customer Details - SJ Mobile</title>

    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700;800&family=Urbanist:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00F0FF;
            --accent: #7B2FFF;
            --dark-text: #1a202c;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Urbanist', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            min-height: 100vh;
        }

        /* Updated Header - Light Navigation Bar */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 1rem 5%;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 2px solid rgba(0, 240, 255, 0.15);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            animation: slideDown 0.6s ease-out;
        }

        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            font-family: 'Exo 2', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
            filter: drop-shadow(0 2px 8px rgba(0, 240, 255, 0.3));
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--dark-text);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            position: relative;
            transition: color 0.3s;
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 240, 255, 0.4);
            border-radius: 2px;
        }

        nav a:hover {
            color: var(--primary);
        }

        nav a:hover::after,
        nav a.active::after {
            width: 100%;
        }

        nav a.active {
            color: var(--primary);
        }

        /* Mobile Menu Toggle */
        .menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 10px;
        }

        .menu-toggle span {
            width: 25px;
            height: 3px;
            background: var(--dark-text);
            border-radius: 3px;
            transition: all 0.3s ease;
        }

        .main-content {
            padding-top: 90px;
            display: flex;
            justify-content: center;
            padding-bottom: 40px;
        }

        .form-container {
            max-width: 750px;
            width: 100%;
            background: white;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.2);
            margin: 20px;
        }

        .form-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .form-header .icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 12px;
        }

        .form-header h1 {
            font-family: 'Exo 2';
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .form-header p {
            font-size: 14px;
            color: #718096;
        }

        .section-title {
            font-size: 12px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            border-bottom: 2px solid #eee;
            padding-bottom: 6px;
        }

        /* Grid Layout for Form Fields */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
        }

        .input-group.full-width {
            grid-column: 1 / -1;
        }

        .input-group label {
            position: absolute;
            top: -10px;
            left: 14px;
            background: white;
            padding: 0 5px;
            font-size: 11px;
            font-weight: 700;
            color: #718096;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,240,255,0.15);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            letter-spacing: 1.5px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 240, 255, 0.4);
        }

        /* Responsive */
        @media (max-width: 768px) {
            nav {
                position: fixed;
                top: 70px;
                left: -100%;
                flex-direction: column;
                background: rgba(255, 255, 255, 0.98);
                backdrop-filter: blur(20px);
                width: 100%;
                padding: 2rem;
                gap: 1.5rem;
                transition: left 0.3s ease;
                border-bottom: 2px solid rgba(0, 240, 255, 0.15);
                box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            }

            nav.active {
                left: 0;
            }

            .menu-toggle {
                display: flex;
            }

            .logo {
                font-size: 1.3rem;
            }

            header {
                padding: 1rem 4%;
            }

            .main-content {
                padding-top: 80px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            .input-group.full-width {
                grid-column: 1;
            }

            .form-container {
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<header>
    <div class="logo">SJMobiles</div>
    <nav id="nav">
        <a href="/mobileproject/home_get/">Home</a>
        <a href="/mobileproject/user_get/" class="active">Customer</a>
        <a href="/mobileproject/user_view/">Repair</a>
    </nav>
    <div class="menu-toggle" onclick="toggleMenu()">
        <span></span>
        <span></span>
        <span></span>
    </div>
</header>

<div class="main-content">
    <div class="form-container">

        <div class="form-header">
            <div class="icon">📱</div>
            <h1>Repair Service</h1>
            <p>Fill in the details to start repair process</p>
        </div>

        <form method="post" action="/mobileproject/user_post/">
            {% csrf_token %}

            <div class="device">
                <div class="section-title">Device Information</div>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Phone Model</label>
                        <input type="text" name="phonemodel" required>
                    </div>

                    <div class="input-group">
                        <label>IMEI Number</label>
                        <input type="number" name="imeino" required>
                    </div>

                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" name="password" required>
                    </div>

                    <div class="input-group">
                        <label>Actual Price (₹)</label>
                        <input type="number" name="actual_price" required min="0">
                    </div>

                    <div class="input-group full-width">
                        <label>Complaint</label>
                        <input type="text" name="complaint" required>
                    </div>
                </div>
            </div>

            <div class="customer">
                <div class="section-title">Customer Information</div>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Customer Name</label>
                        <input type="text" name="customer_name" required>
                    </div>

                    <div class="input-group">
                        <label>Phone Number</label>
                        <input type="number" name="phone_number" required>
                    </div>
                </div>
            </div>

            <button type="submit">Save Details</button>
        </form>

    </div>
</div>

<script>
    function toggleMenu() {
        const nav = document.getElementById('nav');
        nav.classList.toggle('active');
    }

    // Close menu when clicking outside
    document.addEventListener('click', function(event) {
        const nav = document.getElementById('nav');
        const menuToggle = document.querySelector('.menu-toggle');
        
        if (!nav.contains(event.target) && !menuToggle.contains(event.target)) {
            nav.classList.remove('active');
        }
    });
</script>

</body>
</html>
